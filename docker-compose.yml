version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend/frontend
    ports:
      - "5173:5173"

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventorydb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: