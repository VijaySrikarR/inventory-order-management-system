services:

  backend:
    build: ./backend

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventorydb

    ports:
      - "8001:8000"

    depends_on:
      - postgres

  frontend:
    build: ./frontend/frontend

    ports:
      - "5173:5173"

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventorydb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: